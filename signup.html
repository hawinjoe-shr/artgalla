<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Art Gallery</title>
</head>
<body>

    <!-- Our friendly menu at the top -->
    <p>
        <b>🎨 Art Gallery</b> | 
        <a href="index.html">Home</a> | 
        <a href="gallery.html">Browse Art</a> | 
        <a href="login.html">Login</a> | 
        <a href="signup.html">Sign Up</a>
    </p>

    <hr>

    <h2>Create a New Account</h2>

    <!-- Sign up forms need a few more boxes like Email! -->
    <form>
        <p>
            Full Name: <br>
            <input type="text" placeholder="Your Name">
        </p>
        <p>
            Email Address: <br>
            <input type="email" placeholder="name@email.com">
        </p>
        <p>
            Choose Password: <br>
            <input type="password" placeholder="Make a password">
        </p>
        <p>
            <button type="button" onclick="alert('Account created!')">Sign Up</button>
        </p>
    </form>

    <hr>
    <p>Already have an account? <a href="login.html">Log in here!</a></p>

</body>
</html>
